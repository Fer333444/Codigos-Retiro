<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Código de Retiro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
            color: #1e293b;
            padding: 16px;
        }
        .widget {
            max-width: 420px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        }
        .widget h1 {
            font-size: 1.125rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            color: #0f172a;
        }
        .widget p.subtitle {
            font-size: 0.75rem;
            text-align: center;
            color: #64748b;
            margin-bottom: 20px;
        }
        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-closed {
            background: #fff1f2;
            color: #be123c;
            border: 1px solid #fecdd3;
        }
        label.upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 140px;
            border: 2px dashed #93c5fd;
            border-radius: 12px;
            background: #eff6ff;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            padding: 20px;
            text-align: center;
        }
        label.upload-area:hover {
            background: #dbeafe;
            border-color: #3b82f6;
        }
        label.upload-area span.title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #1d4ed8;
        }
        label.upload-area span.hint {
            font-size: 0.75rem;
            color: #64748b;
        }
        input[type="file"] { display: none; }
        #preview {
            display: none;
            margin-top: 12px;
            text-align: center;
        }
        #preview img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }
        button[type="submit"] {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover:not(:disabled) { background: #1d4ed8; }
        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 24px 0;
            color: #2563eb;
            font-size: 0.875rem;
            font-weight: 700;
        }
        .loading.visible { display: block; }
    </style>
</head>
<body>

    <div class="widget">
        <h1>Código de Retiro</h1>
        <p class="subtitle">Sube la captura de tu comprobante bancario</p>

        {% if not horario_activo %}
            <div class="alert alert-closed">Sistema fuera de horario. Inténtalo más tarde.</div>
        {% else %}

            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form id="formWidget" action="{{ url_for('widget_retiro') }}" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="usuario" value="{{ usuario }}">
                {% if token %}<input type="hidden" name="token" value="{{ token }}">{% endif %}

                <label class="upload-area" for="comprobante">
                    <span class="title">Toca para subir imagen</span>
                    <span class="hint">JPG o PNG · Puedes seleccionar varias si es Produbanco</span>
                </label>
                <input type="file" id="comprobante" name="comprobante" accept="image/jpeg,image/png,image/jpg" multiple required>

                <div id="preview"></div>

                <button type="submit" id="btnEnviar" disabled>Enviar comprobante</button>
            </form>

            <div id="loading" class="loading">Procesando comprobante con IA…</div>
        {% endif %}
    </div>

    <script>
        const input = document.getElementById('comprobante');
        const preview = document.getElementById('preview');
        const btnEnviar = document.getElementById('btnEnviar');
        const formWidget = document.getElementById('formWidget');
        const loading = document.getElementById('loading');

        if (input) {
            input.addEventListener('change', function() {
                preview.innerHTML = '';
                if (this.files && this.files.length > 0) {
                    preview.style.display = 'block';
                    for (let i = 0; i < this.files.length; i++) {
                        const img = document.createElement('img');
                        img.src = URL.createObjectURL(this.files[i]);
                        img.style.marginBottom = '8px';
                        preview.appendChild(img);
                    }
                    btnEnviar.disabled = false;
                } else {
                    preview.style.display = 'none';
                    btnEnviar.disabled = true;
                }
            });

            formWidget.addEventListener('submit', function() {
                btnEnviar.disabled = true;
                btnEnviar.textContent = 'Enviando…';
                formWidget.style.display = 'none';
                loading.classList.add('visible');
            });
        }
    </script>

</body>
</html>
