<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC | Auditoría en Tiempo Real</title>
    <style>
        :root { --bg-dark: #0b1120; --panel-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; --accent: #3b82f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; }

        .dashboard-header { background: var(--panel-bg); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px; }
        .title-row { display: flex; justify-content: space-between; align-items: center; }
        .title-area h2 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .live-pulse { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; } }

        .controls-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; width: 100%; }
        .search-box, .filter-select { padding: 8px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-dark); color: white; font-size: 13px; outline: none; flex: 1 1 140px; min-width: 0; box-sizing: border-box; }
        .filter-date-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex: 1 1 200px; min-width: 0; }
        .purga-form { margin: 0; flex: 0 1 auto; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; text-decoration: none; transition: 0.2s; white-space: nowrap; }
        .btn-blue { background: var(--accent); color: white; } .btn-blue:hover { background: #2563eb; }
        .btn-red { background: transparent; color: #ef4444; border: 1px solid #ef4444; } .btn-red:hover { background: #ef4444; color: white; }

        .table-container { background: var(--panel-bg); border-radius: 8px; border: 1px solid var(--border); overflow-y: auto; height: calc(100vh - 160px); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead th { background: #0f172a; padding: 12px 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        tbody td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }

        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .bg-grave { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid #ef4444; }
        .bg-medio { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid #f59e0b; }
        .bg-bajo { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid #10b981; }
        .bg-info { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border: 1px solid #3b82f6; }

        .ip-text { font-family: 'Courier New', Courier, monospace; color: #94a3b8; font-size: 12px; display: block; margin-top: 4px; }
        .event-title { color: #e2e8f0; font-weight: 600; display: block; margin-bottom: 4px; }
        .details-box { margin-top: 6px; font-family: monospace; font-size: 11px; color: #64748b; word-break: break-all; }
        .date-col { color: #cbd5e1; font-size: 12px; white-space: nowrap; }
        .mensaje-principal { color: #f8fafc; font-size: 14px; font-weight: 500; display: block; margin-bottom: 6px; }
        .ruta-text { background: rgba(59, 130, 246, 0.1); color: #93c5fd; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-size: 11px; display: inline-block; margin-bottom: 6px; }

        .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 12px; padding: 12px; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; flex-wrap: wrap; }
        .pagination-bar span { color: var(--text-muted); font-size: 13px; }
        .btn-page { background: #334155; color: white; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-page:not(:disabled):hover { background: var(--accent); }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .dashboard-header { padding: 12px; }
            .controls-row { flex-direction: column; align-items: stretch; }
            .controls-row > .search-box,
            .controls-row > .filter-select,
            .controls-row > .filter-date-group,
            .controls-row > .purga-form,
            .filter-date-group .search-box,
            .filter-date-group .btn,
            .purga-form .btn {
                width: 100%;
                max-width: 100%;
                flex: 1 1 100%;
            }
            .filter-date-group { flex-direction: column; align-items: stretch; }
            #timeInput { max-width: none !important; }
            .btn { text-align: center; }
            .table-container { height: calc(100vh - 220px); border: none; background: transparent; overflow: visible; }

            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }

            tbody tr { background: var(--panel-bg); margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
            tbody td { border: none; padding: 0; font-size: 13px; }

            .mobile-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 4px; }
            .mobile-body { display: flex; flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div class="title-row">
            <div class="title-area">
                <div class="live-pulse" id="status-dot"></div>
                <h2>SOC | Auditoría</h2>
            </div>
            <a href="/" class="btn btn-blue">⬅ Inicio</a>
        </div>
        <div class="controls-row">
            <input type="text" id="buscador_soc" class="search-box" placeholder="🔍 Buscar IP o Usuario...">

            <select id="levelFilter" class="filter-select">
                <option value="todos">🔘 Todos los Niveles</option>
                <option value="GRAVE">🔴 Grave (Hackeos)</option>
                <option value="MEDIO">🟡 Medio (Errores/Fallos)</option>
                <option value="INFO">🔵 Info (Operaciones)</option>
                <option value="BAJO">🟢 Bajo (Visitas)</option>
            </select>

            <select id="filtroCierre" class="filter-select" title="Filtrar por tipo de cierre de operación">
                <option value="todo">📋 Ver Todo</option>
                <option value="retirados">✅ Filtrar: Solo Retirados</option>
                <option value="no_salio">❌ Filtrar: Solo No Salió</option>
                <option value="vencidos">⚠️ Filtrar: Solo Vencidos</option>
            </select>

            <div class="filter-date-group">
                <input type="date" id="dateInput" class="search-box" style="color-scheme: dark; cursor: pointer;" title="Seleccionar Fecha">
                <input type="time" id="timeInput" class="search-box" style="color-scheme: dark; cursor: pointer; max-width: 120px;" title="Seleccionar Hora">
                <button type="button" onclick="limpiarFiltros()" class="btn" style="background: #475569; color: white;" title="Limpiar Filtros">✖ Quitar</button>
            </div>

            <form action="/limpiar_logs_seguridad" method="POST" class="purga-form" onsubmit="return confirm('⚠️ ¿Purga total de datos?');">
                <button type="submit" class="btn btn-red">Purga</button>
            </form>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="15%">Fecha/Hora</th>
                    <th width="10%">Nivel</th>
                    <th width="25%">Evento & IP</th>
                    <th width="50%">Descripción y Detalles</th>
                </tr>
            </thead>
            <tbody id="tabla_logs">
                <tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">Cargando flujo de datos...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="paginacion-soc" class="pagination-bar">
        <button type="button" id="btnPaginaAnterior" class="btn-page" onclick="cambiarPagina(-1)">&lt; Anterior</button>
        <span id="textoPaginacion">Página 1 de 1</span>
        <button type="button" id="btnPaginaSiguiente" class="btn-page" onclick="cambiarPagina(1)">Siguiente &gt;</button>
    </div>

    <script>
        let isPaused = false;
        let lastFetchedDate = '';
        let paginaActual = 1;
        const logsPorPagina = 30;
        let logsFiltrados = [];
        let todosLosLogs = [];
        const isMobile = window.innerWidth <= 768;

        const inputBusqueda = document.getElementById('buscador_soc');
        const selectNivel = document.getElementById('levelFilter');
        const selectCierre = document.getElementById('filtroCierre');
        const inputFecha = document.getElementById('dateInput');
        const inputHora = document.getElementById('timeInput');
        const tbodyLogs = document.getElementById('tabla_logs');

        function textoMensajeDetalles(log) {
            return `${log.mensaje || ''} ${log.detalles || ''}`.toLowerCase();
        }

        function coincideFiltroCierre(log, filtroCierre) {
            if (!filtroCierre || filtroCierre === 'todo') return true;
            const texto = textoMensajeDetalles(log);
            if (filtroCierre === 'retirados') {
                return texto.includes('retirado') || texto.includes('dinero en mano');
            }
            if (filtroCierre === 'no_salio') {
                return texto.includes('no salió') || texto.includes('no salio') || texto.includes('deuda') || texto.includes('fallido');
            }
            if (filtroCierre === 'vencidos') {
                return texto.includes('expirado') || texto.includes('vencido');
            }
            return true;
        }

        function textoBusquedaLog(log) {
            return [
                log.mensaje,
                log.ip,
                log.detalles,
                log.tipo,
                log.url,
                log.nivel,
                log.fecha
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function obtenerFechaFiltro() {
            const searchDateRaw = inputFecha ? inputFecha.value : '';
            if (!searchDateRaw) return '';
            const p = searchDateRaw.split('-');
            return `${p[2]}/${p[1]}/${p[0]}`;
        }

        function aplicarFiltros(resetPagina = true) {
            const texto = (inputBusqueda ? inputBusqueda.value : '').trim().toLowerCase();
            const nivel = selectNivel ? selectNivel.value : 'todos';
            const filtroCierre = selectCierre ? selectCierre.value : 'todo';
            const searchDate = obtenerFechaFiltro();
            const searchTimeRaw = inputHora ? inputHora.value : '';

            logsFiltrados = todosLosLogs.filter(log => {
                const textoOk = !texto || textoBusquedaLog(log).includes(texto);
                const nivelOk = nivel === 'todos' || log.nivel === nivel;
                const fullDate = log.fecha || '';
                const fechaOk = !searchDate || fullDate.startsWith(searchDate);
                const horaOk = !searchTimeRaw || fullDate.includes(' ' + searchTimeRaw);
                const cierreOk = coincideFiltroCierre(log, filtroCierre);
                return textoOk && nivelOk && fechaOk && horaOk && cierreOk;
            });

            if (resetPagina) {
                paginaActual = 1;
            }

            actualizarEstadoLive();
            renderizarTabla();
        }

        function obtenerCriteriosFiltro() {
            const searchText = inputBusqueda ? inputBusqueda.value.trim().toLowerCase() : '';
            const searchDateRaw = inputFecha ? inputFecha.value : '';
            const searchTimeRaw = inputHora ? inputHora.value : '';
            const filterLevel = selectNivel ? selectNivel.value : 'todos';
            const filtroCierre = selectCierre ? selectCierre.value : 'todo';

            return { searchText, searchDateRaw, searchTimeRaw, filterLevel, filtroCierre };
        }

        function actualizarEstadoLive() {
            const { searchText, searchDateRaw, searchTimeRaw, filterLevel, filtroCierre } = obtenerCriteriosFiltro();
            const hayFiltros = !!(searchText || searchDateRaw || searchTimeRaw || (filterLevel && filterLevel !== 'todos') || (filtroCierre && filtroCierre !== 'todo'));
            const dot = document.getElementById('status-dot');

            isPaused = hayFiltros;
            if (!dot) return;

            if (hayFiltros) {
                dot.style.backgroundColor = '#f59e0b';
                dot.style.animation = 'none';
            } else {
                dot.style.backgroundColor = '#10b981';
                dot.style.animation = 'pulse 1.5s infinite';
            }
        }

        function actualizarControlesPaginacion(totalPaginas) {
            const texto = document.getElementById('textoPaginacion');
            const btnAnt = document.getElementById('btnPaginaAnterior');
            const btnSig = document.getElementById('btnPaginaSiguiente');

            if (texto) texto.textContent = `Página ${paginaActual} de ${totalPaginas}`;
            if (btnAnt) btnAnt.disabled = paginaActual <= 1;
            if (btnSig) btnSig.disabled = paginaActual >= totalPaginas;
        }

        function escapeHtml(text) {
            if (text == null) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function renderizarTabla() {
            if (!tbodyLogs) return;

            const totalPaginas = Math.max(1, Math.ceil(logsFiltrados.length / logsPorPagina));
            if (paginaActual > totalPaginas) paginaActual = totalPaginas;
            if (paginaActual < 1) paginaActual = 1;

            const inicio = (paginaActual - 1) * logsPorPagina;
            const logsPagina = logsFiltrados.slice(inicio, inicio + logsPorPagina);

            if (logsFiltrados.length === 0) {
                tbodyLogs.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #64748b; padding: 20px;">No hay eventos que coincidan con los filtros.</td></tr>';
                actualizarControlesPaginacion(1);
                return;
            }

            let html = '';
            logsPagina.forEach(log => {
                let badgeClass = 'bg-bajo';
                if (log.nivel === 'GRAVE') badgeClass = 'bg-grave';
                else if (log.nivel === 'MEDIO') badgeClass = 'bg-medio';
                else if (log.nivel === 'INFO') badgeClass = 'bg-info';

                const detalles = log.detalles && log.detalles !== 'Sin payload adicional'
                    ? `<div class="details-box">${escapeHtml(log.detalles)}</div>`
                    : '';

                if (isMobile) {
                    html += `
                    <tr class="log-row">
                        <td colspan="4">
                            <div class="mobile-header">
                                <span class="badge ${badgeClass}">${escapeHtml(log.nivel)}</span>
                                <span class="date-col">${escapeHtml(log.fecha)}</span>
                            </div>
                            <div class="mobile-body">
                                <span class="event-title">${escapeHtml(log.tipo)}</span>
                                <span class="mensaje-principal">${escapeHtml(log.mensaje)}</span>
                                <span class="ip-text">IP: ${escapeHtml(log.ip)}</span>
                                ${detalles}
                            </div>
                        </td>
                    </tr>`;
                } else {
                    html += `
                    <tr class="log-row">
                        <td class="date-col">${escapeHtml(log.fecha)}</td>
                        <td><span class="badge ${badgeClass}">${escapeHtml(log.nivel)}</span></td>
                        <td>
                            <span class="event-title">${escapeHtml(log.tipo)}</span>
                            <span class="ip-text">${escapeHtml(log.ip)}</span>
                        </td>
                        <td>
                            <span class="mensaje-principal">${escapeHtml(log.mensaje)}</span>
                            <span class="ruta-text">📍 ${escapeHtml(log.url)}</span>
                            ${detalles}
                        </td>
                    </tr>`;
                }
            });

            tbodyLogs.innerHTML = html;
            actualizarControlesPaginacion(totalPaginas);
        }

        async function fetchLogs(fecha = '') {
            try {
                let url = '/api/obtener_logs_seguridad';
                if (fecha) url += `?fecha=${fecha}`;

                const response = await fetch(url);
                todosLosLogs = await response.json();
                lastFetchedDate = fecha;

                aplicarFiltros(!isPaused);
            } catch (error) {
                document.getElementById('status-dot').style.backgroundColor = '#ef4444';
            }
        }

        function cambiarPagina(delta) {
            const totalPaginas = Math.max(1, Math.ceil(logsFiltrados.length / logsPorPagina));
            const nuevaPagina = paginaActual + delta;
            if (nuevaPagina < 1 || nuevaPagina > totalPaginas) return;
            paginaActual = nuevaPagina;
            renderizarTabla();
        }

        function filtrarTabla(preventFetch = false) {
            const { searchDateRaw } = obtenerCriteriosFiltro();
            const hoy = new Date().toISOString().split('T')[0];

            if (searchDateRaw && searchDateRaw !== hoy && !preventFetch) {
                fetchLogs(searchDateRaw);
                return;
            }

            aplicarFiltros(true);
        }

        function limpiarFiltros() {
            if (inputBusqueda) inputBusqueda.value = '';
            if (selectNivel) selectNivel.value = 'todos';
            if (selectCierre) selectCierre.value = 'todo';
            if (inputFecha) inputFecha.value = '';
            if (inputHora) inputHora.value = '';
            lastFetchedDate = '';
            actualizarEstadoLive();
            fetchLogs();
        }

        if (inputBusqueda) {
            inputBusqueda.addEventListener('input', () => aplicarFiltros(true));
        }

        if (selectNivel) {
            selectNivel.addEventListener('change', () => aplicarFiltros(true));
        }

        if (selectCierre) {
            selectCierre.addEventListener('change', () => aplicarFiltros(true));
        }

        if (inputFecha) {
            inputFecha.addEventListener('change', () => filtrarTabla());
        }

        if (inputHora) {
            inputHora.addEventListener('change', () => aplicarFiltros(true));
        }

        fetchLogs();
        setInterval(() => {
            if (!isPaused) {
                fetchLogs(lastFetchedDate);
            }
        }, 3000);

        window.addEventListener('resize', () => {
            if ((window.innerWidth <= 768 && !isMobile) || (window.innerWidth > 768 && isMobile)) {
                location.reload();
            }
        });
    </script>
</body>
</html>
