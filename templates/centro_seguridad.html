<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SOC | Auditoría en Tiempo Real</title>
    <style>
        :root { --bg-dark: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 20px; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .title-area h2 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 12px; }
        .live-pulse { width: 12px; height: 12px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        .controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .search-box { padding: 8px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: white; outline: none; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; transition: 0.2s; }
        .btn-blue { background: #3b82f6; color: white; } .btn-blue:hover { background: #2563eb; }
        .btn-red { background: #ef4444; color: white; } .btn-red:hover { background: #dc2626; }

        .table-container { background: var(--panel-bg); border-radius: 10px; border: 1px solid var(--border); overflow-x: auto; height: 75vh; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead th { background: #0f172a; padding: 15px; font-size: 13px; text-transform: uppercase; color: var(--text-muted); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        tbody td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .bg-grave { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .bg-medio { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid #f59e0b; }
        .bg-bajo { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid #10b981; }
        .bg-info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid #3b82f6; }

        .ip-text { font-family: monospace; color: #cbd5e1; background: #334155; padding: 2px 6px; border-radius: 4px; }
        .details-box { margin-top: 8px; font-family: monospace; font-size: 12px; color: #94a3b8; background: var(--bg-dark); padding: 8px; border-radius: 4px; border-left: 2px solid #3b82f6; word-break: break-all; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div class="title-area">
            <div class="live-pulse" id="status-dot"></div>
            <h2>SOC | Auditoría Global en Tiempo Real</h2>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar IP, Usuario, Evento..." onkeyup="filtrarTabla()">
            <input type="date" id="dateInput" class="search-box" onchange="filtrarTabla()">
            <a href="/" class="btn btn-blue">⬅ Panel Principal</a>
            <form action="/limpiar_logs_seguridad" method="POST" style="margin:0;" onsubmit="return confirm('⚠️ ¿Borrar el historial de auditoría?');">
                <button type="submit" class="btn btn-red">Purga de Datos</button>
            </form>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="15%">Fecha/Hora</th>
                    <th width="10%">Nivel</th>
                    <th width="15%">IP Origen</th>
                    <th width="20%">Evento</th>
                    <th width="40%">Descripción y Payload</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                <tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 30px;">Cargando flujo de datos...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let isPaused = false;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function fetchLogs() {
            if (isPaused) return;
            try {
                const response = await fetch('/api/obtener_logs_seguridad');
                const logs = await response.json();
                renderTable(logs);
            } catch (error) {
                console.error("Error conectando al SOC:", error);
                document.getElementById('status-dot').style.backgroundColor = '#ef4444';
            }
        }

        function renderTable(logs) {
            const tbody = document.getElementById('logs-body');
            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #94a3b8;">Sistemas en línea. Esperando eventos...</td></tr>`;
                return;
            }

            let html = '';
            logs.forEach(log => {
                let badgeClass = 'bg-bajo';
                if (log.nivel === 'GRAVE') badgeClass = 'bg-grave';
                else if (log.nivel === 'MEDIO') badgeClass = 'bg-medio';
                else if (log.nivel === 'INFO') badgeClass = 'bg-info';

                const searchText = `${log.ip || ''} ${log.tipo || ''} ${log.mensaje || ''} ${log.detalles || ''}`.toLowerCase();
                const fechaCorta = (log.fecha || '').substring(0, 10);
                const detalles = log.detalles && log.detalles !== 'Sin payload adicional'
                    ? `<div class="details-box">${escapeHtml(log.detalles)}</div>`
                    : '';

                html += `
                <tr class="log-row" data-fecha="${escapeHtml(fechaCorta)}" data-text="${escapeHtml(searchText)}">
                    <td style="color: #cbd5e1;">${escapeHtml(log.fecha)}</td>
                    <td><span class="badge ${badgeClass}">${escapeHtml(log.nivel)}</span></td>
                    <td><span class="ip-text">${escapeHtml(log.ip)}</span></td>
                    <td style="color: #e2e8f0; font-weight: 500;">${escapeHtml(log.tipo)}</td>
                    <td>
                        <span style="color: #f8fafc;">${escapeHtml(log.mensaje)}</span><br>
                        <small style="color: #64748b;">${escapeHtml(log.url)}</small>
                        ${detalles}
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            filtrarTabla();
        }

        function filtrarTabla() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const searchDateRaw = document.getElementById('dateInput').value;

            if (searchText || searchDateRaw) {
                isPaused = true;
                document.getElementById('status-dot').style.backgroundColor = '#f59e0b';
                document.getElementById('status-dot').style.animation = 'none';
            } else {
                isPaused = false;
                document.getElementById('status-dot').style.backgroundColor = '#10b981';
                document.getElementById('status-dot').style.animation = 'pulse 1.5s infinite';
            }

            let searchDate = "";
            if (searchDateRaw) {
                let p = searchDateRaw.split('-');
                searchDate = `${p[2]}/${p[1]}/${p[0]}`;
            }

            const rows = document.querySelectorAll('.log-row');
            rows.forEach(row => {
                const textMatch = row.getAttribute('data-text').includes(searchText);
                const dateMatch = searchDate === "" || row.getAttribute('data-fecha') === searchDate;

                if (textMatch && dateMatch) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        fetchLogs();
        setInterval(fetchLogs, 3000);
    </script>
</body>
</html>
