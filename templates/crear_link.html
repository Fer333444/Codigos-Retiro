<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Link | Flujo ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex h-screen text-slate-800 font-sans overflow-y-auto">

    <main class="flex-1 flex flex-col p-4 md:p-8 bg-slate-50 w-full">
        <div class="max-w-3xl mx-auto w-full mt-4 md:mt-10">
            
            <a href="/" class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors mb-6 inline-block">
                <i class="fas fa-chevron-left mr-1"></i> Volver a Clientes
            </a>
            
            <h2 class="text-3xl font-black text-slate-800 tracking-tight mb-8">Generar Link de Cliente</h2>
            
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 md:p-8">
                <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Información del Cliente</h3>
                
                <p class="text-sm text-slate-500 mb-8">El nombre de usuario se usará para crear un enlace permanente y pre-llenar su formulario de retiro.</p>
                
                <form action="/crear_link" method="POST" class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Nombre de Usuario (Cliente)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-user text-slate-400"></i>
                            </div>
                            <input type="text" name="usuario_cliente" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-slate-700 font-bold" placeholder="Ej. alex1234">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Grupo de Usuario</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-users text-slate-400"></i>
                            </div>
                            <select name="grupo_usuario" class="w-full pl-11 pr-10 py-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-slate-700 font-bold appearance-none cursor-pointer">
                                <option value="General">General (Sin grupo)</option>
                                <option value="Activaciones 1">Activaciones 1</option>
                                <option value="Activaciones 2">Activaciones 2</option>
                                
                                {% if grupos %}
                                    {% for g in grupos %}
                                        {% if g not in ['General', 'Activaciones 1', 'Activaciones 2'] %}
                                        <option value="{{ g }}">{{ g }}</option>
                                        {% endif %}
                                    {% endfor %}
                                {% endif %}
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                <i class="fas fa-chevron-down text-slate-400 text-xs"></i>
                            </div>
                        </div>
                    </div>
                    
                    <hr class="border-slate-100 my-6">

                    <div>
                        <button type="submit" class="bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-6 rounded-lg shadow-sm transition-colors flex items-center gap-2">
                            <i class="fas fa-link"></i> Generar Link y Guardar
                        </button>
                    </div>
                </form>
            </div>
            
        </div>
    </main>

</body>
</html>
